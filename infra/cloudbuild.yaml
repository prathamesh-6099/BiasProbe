# ── BiasProbe — Cloud Build CI/CD Pipeline ───────────────────────────────────
# Trigger via:  gcloud builds submit --config infra/cloudbuild.yaml .
# Or connect this repo to Cloud Build triggers in the GCP Console.
#
# Required substitution variables (set in trigger or --substitutions flag):
#   _REGION          — e.g. us-central1
#   _AR_REPO         — Artifact Registry repo name, e.g. biasprobeimage-repo
#   _SERVICE_NAME    — Cloud Run service name, e.g. biasprobeimage-backend
#   _GEMINI_API_KEY  — your Gemini API key (store in Secret Manager for prod)
#   _GCS_BUCKET      — GCS bucket for results
#
substitutions:
  _REGION: us-central1
  _AR_REPO: biasprobe-repo
  _SERVICE_NAME: biasprobe-backend
  _IMAGE_NAME: biasprobe-backend
  _GCS_BUCKET: ${PROJECT_ID}-biasprobe-results

steps:
  # ── Step 1: Build the Docker image ─────────────────────────────────────────
  - id: docker-build
    name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - --tag
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${COMMIT_SHA}"
      - --tag
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:latest"
      - --file
      - infra/Dockerfile
      - --cache-from
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:latest"
      - ./backend
    waitFor: ["-"]  # start immediately

  # ── Step 2: Push both tags to Artifact Registry ────────────────────────────
  - id: docker-push-sha
    name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${COMMIT_SHA}"
    waitFor: [docker-build]

  - id: docker-push-latest
    name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:latest"
    waitFor: [docker-build]

  # ── Step 3: Deploy to Cloud Run ────────────────────────────────────────────
  - id: cloud-run-deploy
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - --image
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${COMMIT_SHA}"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=5
      - --memory=512Mi
      - --cpu=1
      - --timeout=300
      - --concurrency=80
      - --set-env-vars
      - "GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GCS_BUCKET_NAME=${_GCS_BUCKET}"
      - --port=8080
    waitFor: [docker-push-sha]

# ── Image artifacts saved to Artifact Registry ────────────────────────────────
images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${COMMIT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8   # faster builds

timeout: "1200s"
